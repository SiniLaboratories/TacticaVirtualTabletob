<!DOCTYPE html>
<html>
<head><title>Edit {{ filename }}</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head>
<body>
    <div class="container">
        <h1>Edit System File: {{ filename }}</h1>
        <form method="POST">
            <textarea name="json_data" class="fullscreen-editor">{{ json_data }}</textarea>
            <br>
            <button type="submit">Save Changes</button>
            <a href="/editor/{{ filename }}" class="btn">Refresh Data</a>
            <a href="/" class="btn">Go Back</a>
        </form>
    </div>
</body>
</html>
