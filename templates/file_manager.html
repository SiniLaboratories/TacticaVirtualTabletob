<!DOCTYPE html>
<html>
<head><title>File Manager</title><link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head>
<body>
    <div class="container">
        <h1>File System Manager</h1>
        <div class="panel">
            <h3>Upload File</h3>
            <form method="POST" enctype="multipart/form-data">
                <input type="hidden" name="action" value="upload">
                <select name="target_dir">
                    {% for dir in directories %}
                        <option value="{{ dir }}">{{ dir if dir else 'Root (uploads/)' }}</option>
                    {% endfor %}
                </select>
                <input type="file" name="file" required>
                <button type="submit">Upload</button>
            </form>
        </div>
        <div class="panel">
            <h3>Create Sub-Directory</h3>
            <form method="POST">
                <input type="hidden" name="action" value="create_dir">
                <select name="target_dir">
                    {% for dir in directories %}
                        <option value="{{ dir }}">{{ dir if dir else 'Root (uploads/)' }}</option>
                    {% endfor %}
                </select>
                <input type="text" name="new_dir" placeholder="Folder Name" required>
                <button type="submit">Create</button>
            </form>
        </div>
        <div class="panel">
            <h3>Directory Tree</h3>
            {% for item in tree %}
                <div class="tree-item" style="padding-left: {{ item.path.count('/') * 20 }}px">
                    <span>
                        {% if item.type == 'dir' %} 📁 {% else %} 📄 {% endif %} 
                        {{ item.name }}
                    </span>
                    <form method="POST" onsubmit="return confirm('Are you sure you want to delete this?');">
                        <input type="hidden" name="action" value="delete">
                        <input type="hidden" name="target_path" value="{{ item.path }}">
                        <button type="submit">DELETE</button>
                    </form>
                </div>
            {% endfor %}
        </div>
        <a href="/" class="btn">Go Back</a>
    </div>
</body>
</html>
